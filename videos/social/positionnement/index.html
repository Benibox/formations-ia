<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ce qu'on fait différemment</title>
  <meta name="resolution" content="1080x1920">
  <meta name="fps" content="30">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #FAFAF8; --bg-warm: #F5F0EB; --accent: #C45D3E; --accent-soft: #E8A990; --heading: #1A1A1A; --text: #4A4A4A; }
    body { width: 1080px; height: 1920px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; position: relative; }
    .blob-1 { position: absolute; top: -100px; right: -80px; width: 500px; height: 500px; background: var(--bg-warm); border-radius: 45% 55% 52% 48% / 48% 45% 55% 52%; opacity: 0; }
    .blob-2 { position: absolute; bottom: 300px; left: -120px; width: 450px; height: 450px; background: var(--bg-warm); border-radius: 52% 48% 45% 55% / 55% 52% 48% 45%; opacity: 0; }
    .blob-3 { position: absolute; top: 40%; left: 50%; width: 600px; height: 600px; background: rgba(196, 93, 62, 0.04); border-radius: 40% 60% 55% 45% / 50% 40% 60% 50%; opacity: 0; }
    .top-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--accent); transform-origin: left; }
    .header { position: absolute; top: 72px; left: 72px; right: 72px; display: flex; justify-content: space-between; align-items: center; opacity: 0; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 44px; color: var(--heading); }
    .badge { padding: 14px 28px; background: var(--accent); border-radius: 50px; color: white; font-size: 22px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
    .hook { position: absolute; top: 240px; left: 72px; right: 72px; text-align: center; opacity: 0; }
    .hook-text { font-family: 'DM Sans', sans-serif; font-size: 42px; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }
    .title { position: absolute; top: 400px; left: 60px; right: 60px; text-align: center; }
    .title-line { font-family: 'DM Serif Display', serif; font-size: 76px; line-height: 1.12; color: var(--heading); opacity: 0; }
    .title-line .accent { color: var(--accent); }
    .divider { position: absolute; top: 660px; left: 50%; width: 80px; height: 4px; background: var(--accent); border-radius: 2px; transform-origin: center; }
    .bullets { position: absolute; top: 730px; left: 72px; right: 72px; display: flex; flex-direction: column; gap: 40px; }
    .bullet { display: flex; align-items: center; gap: 28px; opacity: 0; background: white; padding: 28px 32px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border-left: 5px solid var(--accent); }
    .bullet-number { flex-shrink: 0; width: 52px; height: 52px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 26px; font-weight: 800; }
    .bullet-text { font-size: 36px; font-weight: 600; line-height: 1.35; color: var(--heading); }
    .bullet-text em { font-style: normal; color: var(--accent); font-weight: 800; }
    .takeaway { position: absolute; bottom: 440px; left: 60px; right: 60px; background: var(--heading); border-radius: 28px; padding: 52px 48px; text-align: center; opacity: 0; }
    .takeaway-text { font-family: 'DM Serif Display', serif; font-size: 56px; color: white; line-height: 1.25; }
    .takeaway-accent { color: var(--accent-soft); }
    .cta { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: var(--bg); z-index: 100; opacity: 0; }
    .cta-logo { font-family: 'DM Serif Display', serif; font-size: 72px; color: var(--heading); margin-bottom: 60px; }
    .cta-line { width: 60px; height: 3px; background: var(--accent); margin-bottom: 60px; }
    .cta-label { font-size: 30px; font-weight: 600; color: var(--text); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 24px; }
    .cta-url { font-family: 'DM Serif Display', serif; font-size: 80px; color: var(--accent); margin-bottom: 40px; }
    .cta-phone { font-size: 44px; font-weight: 500; color: var(--heading); margin-bottom: 16px; }
    .cta-email { font-size: 36px; color: var(--text); }
  </style>
</head>
<body>
  <div data-composition-id="positionnement" data-width="1080" data-height="1920" data-start="0" data-duration="20">
    <div class="blob-1"></div>
    <div class="blob-2"></div>
    <div class="blob-3"></div>
    <div class="top-line"></div>

    <div class="header clip" data-start="0" data-duration="20" data-track-index="0">
      <div class="logo">Benul IA</div>
      <div class="badge">Notre approche</div>
    </div>

    <div class="hook clip" data-start="0.5" data-duration="3" data-track-index="1">
      <div class="hook-text">Pas une formation de plus.</div>
    </div>

    <div class="title clip" data-start="2" data-duration="14" data-track-index="2">
      <div class="title-line" id="title1">Ce qu'on fait</div>
      <div class="title-line" id="title2"><span class="accent">différemment</span></div>
    </div>

    <div class="divider clip" data-start="3.5" data-duration="12" data-track-index="3"></div>

    <div class="bullets clip" data-start="4" data-duration="12" data-track-index="4">
      <div class="bullet" id="b1">
        <div class="bullet-number">1</div>
        <div class="bullet-text">On forme <em>par métier</em>, pas par outil</div>
      </div>
      <div class="bullet" id="b2">
        <div class="bullet-number">2</div>
        <div class="bullet-text">On livre des <em>livrables concrets</em>, pas des slides</div>
      </div>
      <div class="bullet" id="b3">
        <div class="bullet-number">3</div>
        <div class="bullet-text">On <em>reste après</em> la formation</div>
      </div>
    </div>

    <div class="takeaway clip" data-start="13" data-duration="7" data-track-index="5">
      <div class="takeaway-text"><span class="takeaway-accent">Autonomie.</span><br>Pas dépendance.</div>
    </div>

    <div class="cta clip" data-start="16" data-duration="4" data-track-index="6">
      <div class="cta-logo">Benul IA</div>
      <div class="cta-line"></div>
      <div class="cta-label">Contactez-nous</div>
      <div class="cta-url">benul-ia.fr</div>
      <div class="cta-phone">06 79 97 90 26</div>
      <div class="cta-email">contact@benul-ia.fr</div>
    </div>
  </div>

  <script>
    const tl = gsap.timeline({ paused: true });
    tl.to('.blob-1', { opacity: 0.7, duration: 1.2, ease: 'power2.out' }, 0);
    tl.to('.blob-2', { opacity: 0.5, duration: 1.2, ease: 'power2.out' }, 0.2);
    tl.to('.blob-3', { opacity: 1, duration: 1.5, ease: 'power2.out' }, 0.3);
    tl.to('.blob-1', { x: 30, y: 20, rotation: 5, duration: 18, ease: 'none' }, 0);
    tl.to('.blob-2', { x: -20, y: -30, rotation: -3, duration: 18, ease: 'none' }, 0);
    tl.to('.blob-3', { scale: 1.1, rotation: 8, duration: 18, ease: 'none' }, 0);
    tl.fromTo('.top-line', { scaleX: 0 }, { scaleX: 1, duration: 0.6, ease: 'power4.out' }, 0);
    tl.fromTo('.header', { opacity: 0, y: -30 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power4.out' }, 0.2);
    tl.fromTo('.hook', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' }, 0.5);
    tl.to('.hook', { opacity: 0, y: -20, duration: 0.3, ease: 'power2.in' }, 2.8);
    tl.fromTo('#title1', { opacity: 0, y: 60 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power4.out' }, 2.2);
    tl.fromTo('#title2', { opacity: 0, y: 60 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power4.out' }, 2.5);
    tl.fromTo('.divider', { scaleX: 0, x: -40 }, { scaleX: 1, x: -40, duration: 0.4, ease: 'power4.out' }, 3.5);
    tl.fromTo('#b1', { opacity: 0, x: -100 }, { opacity: 1, x: 0, duration: 0.5, ease: 'power4.out' }, 4.5);
    tl.fromTo('#b2', { opacity: 0, x: -100 }, { opacity: 1, x: 0, duration: 0.5, ease: 'power4.out' }, 6.5);
    tl.fromTo('#b3', { opacity: 0, x: -100 }, { opacity: 1, x: 0, duration: 0.5, ease: 'power4.out' }, 8.5);
    tl.to('.title', { opacity: 0, y: -40, duration: 0.4, ease: 'power2.in' }, 11.2);
    tl.to('.divider', { opacity: 0, duration: 0.3 }, 11.2);
    tl.to('.bullets', { opacity: 0, y: -30, duration: 0.4, ease: 'power2.in' }, 11.5);
    tl.fromTo('.takeaway', { opacity: 0, scale: 0.8, y: 60 }, { opacity: 1, scale: 1, y: 0, duration: 0.7, ease: 'expo.out' }, 13);
    tl.to('.takeaway', { opacity: 0, y: -50, duration: 0.4, ease: 'power2.in' }, 15.5);
    tl.fromTo('.cta', { opacity: 0 }, { opacity: 1, duration: 0.6, ease: 'power2.out' }, 15.8);
    tl.fromTo('.cta-logo', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 16);
    tl.fromTo('.cta-line', { scaleX: 0 }, { scaleX: 1, duration: 0.4, ease: 'power2.out' }, 16.3);
    tl.fromTo('.cta-label', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: 'power2.out' }, 16.5);
    tl.fromTo('.cta-url', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' }, 16.8);
    tl.fromTo('.cta-phone', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: 'power2.out' }, 17.2);
    tl.fromTo('.cta-email', { opacity: 0 }, { opacity: 1, duration: 0.4, ease: 'power2.out' }, 17.5);
    tl.to('body', { opacity: 0, duration: 0.8, ease: 'power2.in' }, 19);
    window.__timelines = window.__timelines || {};
    window.__timelines["positionnement"] = tl;
  </script>
</body>
</html>
